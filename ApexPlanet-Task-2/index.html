<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 | Contact Form & To-Do App</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->

    <header>

        <nav>

            <div class="logo">
                Task-2
            </div>

            <ul>

                <li><a href="#home">Home</a></li>

                <li><a href="#contact">Contact</a></li>

                <li><a href="#todo">ToDo</a></li>

            </ul>

        </nav>

    </header>

    <!-- Hero -->

    <section class="hero" id="home">

        <h1>Contact Form & To-Do List</h1>

        <p>

            ApexPlanet Internship Task-2

        </p>

    </section>

    <!-- Contact Form -->

    <section class="contact" id="contact">

        <h2>Contact Form</h2>

        <form id="contactForm">

            <input
                type="text"
                id="name"
                placeholder="Enter Your Name">

            <input
                type="email"
                id="email"
                placeholder="Enter Your Email">

            <input
                type="text"
                id="subject"
                placeholder="Subject">

            <textarea
                id="message"
                rows="6"
                placeholder="Write Your Message"></textarea>

            <button type="submit">

                Send Message

            </button>

            <p id="formMessage"></p>

        </form>

    </section>

    <!-- Todo -->

    <section class="todo" id="todo">

        <h2>To-Do List</h2>

        <div class="todo-box">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter New Task">

            <button id="addTask">

                Add

            </button>

        </div>

        <input
            type="text"
            id="searchTask"
            placeholder="Search Task">

        <p>

            Total Tasks :

            <span id="taskCount">

                0

            </span>

        </p>

        <ul id="taskList">

        </ul>

    </section>

    <footer>

        <p>

            © 2026 ApexPlanet Internship

        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
