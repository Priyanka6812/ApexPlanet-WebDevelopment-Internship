<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task 5 | E-Commerce Website</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= Navbar ================= -->

<header>

<nav>

<div class="logo">

ShopEasy

</div>

<ul>

<li><a href="#home">Home</a></li>

<li><a href="#products">Products</a></li>

<li><a href="#cart">Cart</a></li>
<li><a href="#contact">Contact</a></li>

</ul>

<div class="nav-right">

<button id="themeBtn">🌙</button>

<div class="cart-icon">

🛒 <span id="cartCount">0</span>

</div>

</div>

</nav>

</header>

<!-- ================= Hero ================= -->

<section class="hero" id="home">

<div class="hero-text">

<h1>

Welcome To ShopEasy

</h1>

<p>

Modern Responsive E-Commerce Website using HTML CSS JavaScript.

</p>

<a href="#products">

<button>

Shop Now

</button>

</a>

</div>

<div class="hero-image">

<img src="https://picsum.photos/id/1060/500/400">

</div>

</section>

<!-- ================= Search ================= -->

<section class="search-section">

<input

type="text"

id="search"

placeholder="Search Product">

<select id="category">

<option value="all">

All Categories

</option>

<option value="Laptop">

Laptop

</option>

<option value="Phone">

Phone

</option>

<option value="Watch">

Watch

</option>

</select>

<select id="sort">

<option value="default">

Sort Price

</option>

<option value="low">

Low To High

</option>

<option value="high">

High To Low

</option>

</select>

</section>

<!-- ================= Products ================= -->

<section id="products">

<h2>

Our Products

</h2>

<div id="productContainer">

</div>

</section>

<!-- ================= Cart ================= -->

<section id="cart">

<h2>

Shopping Cart

</h2>

<div id="cartItems">

</div>

<h3>

Total :

₹ <span id="totalPrice">0</span>

</h3>

</section>

<!-- ================= Contact ================= -->

<section id="contact">

<h2>

Contact Us

</h2>

<p>

📧 support@shopeasy.com

</p>

<p>

📞 +91 9876543210

</p>

</section>

<footer>

<p>

© 2026 ShopEasy | ApexPlanet Internship

</p>

</footer>

<script src="script.js"></script>

</body>

</html>
